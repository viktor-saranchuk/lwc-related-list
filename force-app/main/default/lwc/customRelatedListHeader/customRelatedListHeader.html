                    <div class="slds-col slds-media">
                        <div class="slds-media__figure">

                        </div>
                        <div class="slds-media__body">

                        </div>
                    </div>
                    <template lwc:if={listType.isEnhanced}>

                            <slot name="controls"></slot>
                        </div>
                    </template>
                    <div class="slds-col slds-col_bump-left actions">
                        <slot name="actions"></slot>
                    </div>
                </div>

            <template lwc:elseif={viewMode.isFull}>

            </template>
        </template>
        <template lwc:else>

            </template>
        </template>
        
        

    </div>
