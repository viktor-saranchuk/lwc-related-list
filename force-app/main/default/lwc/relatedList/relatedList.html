<template>
    <div class="slds-tabs_card slds-grid slds-grid_vertical slds-box slds-p-around_none">
        <c-related-list-header mode={mode} type={listType}>
            <lightning-icon slot="icon" icon-name={iconName} size={iconSize} ></lightning-icon>

            <template lwc:if={data}>
                <template lwc:if={breadcrumbs}>
                    <lightning-breadcrumbs slot="breadcrumbs">
                            <template for:each={breadcrumbs} for:item="breadcrumb">
                                <lightning-breadcrumb key={breadcrumb.key} label={breadcrumb.label} href={breadcrumb.href}></lightning-breadcrumb>
                            </template>
                    </lightning-breadcrumbs>
                </template>
            </template>

            <div slot="title" class="slds-truncate">
                <template lwc:if={viewMode.isCompact}>
                    <h2 class="slds-card__header-title">
                        <a href={viewAllUrl} class="slds-text-color_default title-link">
                            <span>{title}</span>
                        </a>
                    </h2>
                </template>
                <template lwc:if={viewMode.isFull}>
                    <h1 class="slds-page-header__title">
                        <span>{title}</span>
                    </h1>
                </template>
            </div>

            <template lwc:if={data}>
                <span slot="info">
                    <template lwc:if={viewMode.isFull}>{info}</template>
                    <template lwc:if={viewMode.isCompact}>
                        <tempalte lwc:if={data.length}>{info}</tempalte>
                    </template>
                </span>
            </template>

            <lightning-button-menu slot="controls" alternative-text={controls.listViewControls.label} variant="border-filled" icon-name={controls.listViewControls.iconName} menu-alignment="right" tooltip={controls.listViewControls.label} onselect={handleControlClick}>
                <template lwc:if={viewMode.isFull}>
                    <lightning-menu-item value={controls.resetColumnSorting.name} label={controls.resetColumnSorting.label} disabled={isResetColumnSortingDisabled}></lightning-menu-item>
                </template>
                <lightning-menu-item value={controls.resetColumnWidths.name} label={controls.resetColumnWidths.label} disabled={isResetColumnWidthsDisabled}></lightning-menu-item>
            </lightning-button-menu>

            <div slot="controls" class="slds-p-around_none slds-m-left_xx-small button-icon-wrapper">
                <lightning-button-icon icon-name={controls.refresh.iconName} name={controls.refresh.name} alternative-text={controls.refresh.label} title={controls.refresh.label} tooltip={controls.refresh.label} onclick={handleControlClick}></lightning-button-icon>
            </div>
            <template lwc:if={viewMode.isFull}>
                <div slot="controls" class="slds-p-around_none slds-m-left_xx-small button-icon-wrapper">
                    <lightning-button-icon icon-name={controls.columnSort.iconName} name={controls.columnSort.name} alternative-text={controls.columnSort.label} title={controls.columnSort.label} tooltip={controls.columnSort.label} onclick={handleControlClick}></lightning-button-icon>
                </div>
                <div slot="controls" class="slds-p-around_none slds-m-left_xx-small button-icon-wrapper">
                    <lightning-button-icon-stateful icon-name={controls.showQuickFilters.iconName} data-name={controls.showQuickFilters.name} name={controls.showQuickFilters.name} alternative-text={controls.showQuickFilters.label} title={controls.showQuickFilters.label} tooltip={controls.showQuickFilters.label} selected={showQuickFilters} onclick={handleControlClick}></lightning-button-icon-stateful>
                </div>
            </template>

            <template lwc:if={listViewActionButtons.length}>
                <div slot="actions" class="button-icon-wrapper">
                    <lightning-button-group>
                        <template for:each={listViewActionButtons} for:item="action">
                            <lightning-button key={action.name} label={action.label} name={action.name} onclick={handleActionClick}></lightning-button>
                        </template>
                        <template lwc:if={listViewActionMenuItems.length}>
                            <lightning-button-menu menu-alignment="right" onselect={handleActionClick}>
                                <template for:each={listViewActionMenuItems} for:item="action">
                                    <lightning-menu-item key={action.name} label={action.label} value={action.name}></lightning-menu-item>
                                </template>
                            </lightning-button-menu>
                        </template>
                    </lightning-button-group>
                </div>
            </template>
        </c-related-list-header>

        <template lwc:if={formFactor.isLarge}>
            <template lwc:if={showQuickFilters}>
                <div>
                    <div class="slds-is-absolute slds-panel_docked-right quick-filters-pane">
                        <c-filters-pane instance-id={instanceId} filters={filters} onclose={closeFilters} onapply={applyFilters}></c-filters-pane>
                    </div>
                </div>
                
            </template>

            <template lwc:if={data}>
                <div class="slds-col slds-border_top slds-scrollable_y body-table-container slds-is-relative">
                    <tempalte lwc:if={data.length}>
                        <lightning-datatable columns={columns} data={data} key-field="Id" show-row-number-column hide-checkbox-column={viewMode.isCompact} sortable sorted-by={sortConfig.fieldNames} sorted-direction={sortConfig.sortDirections} onresize={handleColumnsResize} onsort={handleColumnsSort}></lightning-datatable>
                        <template lwc:if={isRefresh}>
                            <lightning-spinner alternative-text={labels.loading} variant="brand"></lightning-spinner>
                        </template>
                    </tempalte>
                    <template lwc:elseif={viewMode.isFull}>
                        <c-related-list-body-empty-data></c-related-list-body-empty-data>
                    </template>
                </div>
            </template>
            <tempalte lwc:else>
                <div class="slds-col slds-scrollable_y body-table-container slds-is-relative">
                    <c-related-list-body-initial columns={columns} number-of-rows={numberOfSkeletonRows}></c-related-list-body-initial>
                </div>
            </tempalte>

            <template lwc:if={viewMode.isCompact}>
                <template lwc:if={data}>
                    <template lwc:if={data.length}>
                        <div class="slds-card__footer slds-m-top_none">
                            <lightning-formatted-url value={viewAllUrl} label={labels.viewAll}></lightning-formatted-url>
                        </div>
                    </template>
                </template>
            </template>
        </template>
        <template lwc:else>
            <template lwc:if={viewMode.isCompact}>
                MOBILE COMPACT
            </template>
            <template lwc:if={viewMode.isFull}>
                MOBILE FULL
            </template>
        </template>
    </div>
</template>
