<template>
    <template lwc:if={formFactor.isLarge}>
        <template lwc:if={columns}>
            <template lwc:if={isDataLoaded}>
                <template lwc:if={hasData}>
                    <slot name="datatable"></slot>
                </template>
                <template lwc:else>
                    <template lwc:if={viewMode.isFull}>
                        <c-custom-related-list-no-data-body></c-custom-related-list-no-data-body>
                    </template>
                </template>
            </template>
            <template lwc:else>
                <c-skeleton-table columns={columns} number-of-rows={numberOfSkeletonRows}></c-skeleton-table>
            </template>
        </template>
    </template>
    <template lwc:else></template>
</template>
