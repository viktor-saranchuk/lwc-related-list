<template>
    <div class="slds-page-header slds-is-relative slds-p-bottom_x-small no-bottom-border-radius">
        <template lwc:if={formFactor.isLarge}>
            <div class="slds-grid slds-wrap slds-gutters_xxxx-small slds-grid_vertical-align-center vertical-gap">
                <div class="slds-col slds-media slds-grid slds-grid_vertical-align-center">
                    <div class="slds-media__figure slds-col_bump-top slds-col_bump-bottom">
                        <slot name="icon"></slot>
                    </div>
                    <div class="slds-media__body slds-grid slds-grid_vertical">
                        <template lwc:if={viewMode.isFull}>
                            <div class="slds-col">
                                <tempalte lwc:if={showSkeleton}>
                                    <c-skeleton class="breadcumbs-skeleton"></c-skeleton>
                                </tempalte>
                                <slot name="breadcrumbs" onslotchange={hideSkeleton}></slot>
                            </div>
                        </template>
                        <div class="slds-col">
                            <slot name="title"></slot>
                        </div>
                    </div>
                </div>
                <template lwc:if={viewMode.isCompact}>
                    <template lwc:if={listType.isEnhanced}>
                        <div class="slds-col slds-col_bump-left slds-grid controls">
                            <slot name="controls" onslotchange={handleControlsAdded}></slot>
                        </div>
                    </template>
                </template>
                <div class="slds-col slds-col_bump-left actions">
                    <slot name="actions"></slot>
                </div>
            </div>

            <div class="slds-grid slds-wrap slds-gutters_xxxx-small slds-m-top_xx-small slds-grid_vertical-align-end vertical-gap">
                <template lwc:if={listType.isEnhanced}>
                    <div class="slds-col">
                        <tempalte lwc:if={showSkeleton}>
                            <c-skeleton class="info-skeleton"></c-skeleton>
                        </tempalte>
                        <slot name="info" onslotchange={hideSkeleton}></slot>
                    </div>
                    <template lwc:if={viewMode.isFull}>
                        <div class="slds-col slds-col_bump-left slds-grid controls">
                            <slot name="controls" onslotchange={handleControlsAdded}></slot>
                        </div>
                    </template>
                </template>
            </div>
        </template>
        <template lwc:else>
            <template lwc:if={viewMode.isFull}>

            </template>
        </template>
    </div>
</template>
