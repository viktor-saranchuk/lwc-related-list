<template>
    <lightning-layout multiple-rows class="slds-border_top slds-border_bottom">
        <template lwc:if={data}>
            <template for:each={data} for:item="tile">
                <lightning-layout-item key={tile.id} size="12" small-device-size="12" medium-device-size="12" large-device-size="4" class="tile" padding="around-medium">
                    <div class="slds-grid">
                        <div class="slds-col">
                            <lightning-icon icon-name={iconName}></lightning-icon>
                        </div>
                        <div class="slds-col slds-m-horizontal_x-small details">
                            <p><lightning-formatted-url label={tile.title.label} value={tile.title.value}></lightning-formatted-url></p>
                            <dl class="slds-list_horizontal slds-wrap">
                                <template for:each={tile.fields} for:item="field">
                                    <dt key={field.column.label} class="slds-item_label slds-text-color_weak slds-truncate" title={field.column.label}>{field.column.label}:</dt>
                                    <dd key={field.column.fieldName} class="slds-item_detail slds-truncate" title={field.value}>
                                        
                                        <template lwc:if={field.isBoolean}>
                                            <template lwc:if={field.value}><lightning-icon icon-name="utility:check"></lightning-icon></template>
                                        </template>
                                        <template lwc:elseif={field.isDate}>
                                            <lightning-formatted-date-time
                                                date-style={field.column.typeAttributes.dateStyle}
                                                day={field.column.typeAttributes.day}
                                                era={field.column.typeAttributes.era}
                                                hour={field.column.typeAttributes.hour}
                                                hour12={field.column.typeAttributes.hour12}
                                                minute={field.column.typeAttributes.minute}
                                                month={field.column.typeAttributes.month}
                                                second={field.column.typeAttributes.second}
                                                time-zone={field.column.typeAttributes.timeZone}
                                                time-zone-name={field.column.typeAttributes.timeZoneName}
                                                value={field.value}
                                                weekday={field.column.typeAttributes.weekday}
                                                year={field.column.typeAttributes.year}
                                            ></lightning-formatted-date-time>
                                        </template>
                                        <template lwc:elseif={field.isEmail}>
                                            <lightning-formatted-email
                                                hide-icon="true"
                                                label={field.label}
                                                value={field.value}
                                            ></lightning-formatted-email>
                                        </template>
                                        <template lwc:elseif={field.isLocation}>
                                            <lightning-formatted-location
                                                latitude={field.latitude}
                                                longitude={field.longitude}
                                            ></lightning-formatted-location>
                                        </template>
                                        <template lwc:elseif={field.isNumber}>
                                            <lightning-formatted-number
                                                currency-code={field.column.typeAttributes.currencyCode}
                                                currency-display-as={field.column.typeAttributes.currencyDisplayAs}
                                                format-style={field.column.typeAttributes.formatStyle}
                                                maximum-fraction-digits={field.column.typeAttributes.maximumFractionDigits}
                                                maximum-significant-digits={field.column.typeAttributes.maximumSignificantDigits}
                                                minimum-fraction-digits={field.column.typeAttributes.minimumFractionDigits}
                                                minimum-integer-digits={field.column.typeAttributes.minimumIntegerDigits}
                                                minimum-significant-digits={field.column.typeAttributes.minimumSignificantDigits}
                                                value={field.value}
                                            ></lightning-formatted-number>
                                        </template>
                                        <template lwc:elseif={field.isPhone}>
                                            <lightning-formatted-phone value={field.value}></lightning-formatted-phone>
                                        </template>
                                        <template lwc:elseif={field.isUrl}>
                                            <lightning-formatted-url
                                                label={field.label}
                                                target={field.column.typeAttributes.target}
                                                tooltip={field.column.typeAttributes.tooltip}
                                                value={field.value}
                                            ></lightning-formatted-url>
                                        </template>
                                        <template lwc:elseif={field.isText}>
                                            <lightning-formatted-text 
                                                value={field.value}
                                                linkify={field.column.typeAttributes.linkify}
                                            ></lightning-formatted-text>
                                        </template>
                                    </dd>
                                </template>
                            </dl>
                        </div>
                        <tempalte lwc:if={formFactor.isLarge}>
                            <div class="slds-col">
                                <template lwc:if={tile.actions}>
                                    <lightning-button-menu data-id={tile.id} icon-size="x-small" menu-alignment="auto" onselect={handleSelect}>
                                        <template for:each={tile.actions} for:item="action">
                                            <lightning-menu-item 
                                                key={action.name}
                                                value={action.name}
                                                label={action.label}
                                                disabled={action.disabled}
                                                checked={action.checked}
                                                download={action.download}
                                                draft-alternative-text={action.dtaftAlternativeText}
                                                href={action.href}
                                                icon-name={action.iconName}
                                                icon-type={action.iconType}
                                                is-draft={action.isDraft}
                                                prefix-icon-name={action.prefixIconName}
                                                target={action.target}>
                                            </lightning-menu-item>
                                        </template>
                                    </lightning-button-menu>
                                </template>
                            </div>
                        </tempalte>
                    </div>
                </lightning-layout-item>
            </template>
        </template>
        <template lwc:else>
            <template for:each={rowsInitial} for:item="row">
                <lightning-layout-item key={row.index} size="12" small-device-size="12" medium-device-size="12" large-device-size="4" class="tile" padding="around-medium">
                    <div class="slds-grid slds-gutters_x-small">
                        <div class="slds-col">
                            <c-skeleton class="skeleton-icon"></c-skeleton>
                        </div>
                        <div class="slds-col">
                            <div class="slds-m-top_x-small">
                                <c-skeleton class="skeleton-body odd-skeleton"></c-skeleton>
                            </div>
                            <div class="slds-m-top_x-small">
                                <c-skeleton class="skeleton-body"></c-skeleton>
                            </div>
                            <div class="slds-m-top_x-small">
                                <c-skeleton class="skeleton-body odd-skeleton"></c-skeleton>
                            </div>
                            <div class="slds-m-top_x-small">
                                <c-skeleton class="skeleton-body"></c-skeleton>
                            </div>
                        </div>
                        <div class="slds-col"></div>
                    </div>
                </lightning-layout-item>
            </template>
        </template>
    </lightning-layout>
</template>
