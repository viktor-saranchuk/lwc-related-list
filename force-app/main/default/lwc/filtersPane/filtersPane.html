<template>
    <div class="slds-grid slds-grid_vertical slds-box slds-p-around_none pane">
        <div class="slds-col slds-p-around_small slds-grid slds-grid_align-spread slds-border_bottom">
            <div class="slds-col slds-panel__header-title slds-text-heading_small slds-truncate">
                {labels.filters}
            </div>
            <div class="slds-col">
                <lightning-button-icon icon-name="utility:close" data-name="close" variant="container" size="small" alternative-text={labels.close} title={labels.close} onclick={handleCloseFilters}></lightning-button-icon>
            </div>
        </div>
        <div class="slds-col slds-grid slds-grid_vertical slds-grow slds-p-around_small slds-scrollable filter-items">
            <div class="slds-col slds-grid slds-grid_vertical-align-center">
                {labels.quickFilters}<lightning-helptext content={labels.quickFiltersHelpText} class="slds-m-left_xx-small slds-m-bottom_xxx-small"></lightning-helptext>
            </div>
            <template for:each={filters} for:item="filter">
                <div key={filter.name} class="slds-col slds-size_1-of-1 slds-m-bottom_xx-small">
                    <div class={filter.clearableClass}>
                        <lightning-button variant="base" class="slds-col_bump-left" label={labels.clear} title={labels.clear} disable-animation data-for={filter.name} onclick={handleClear}></lightning-button>
                    </div>
                    <template lwc:if={filter.requiresRange}>
                        <legend class="slds-form-element__label">
                            <b>{filter.label}</b>
                        </legend>
                    </template>
                    <template lwc:if={filter.requiresStartEndRange}>
                        <div class="slds-grid slds-gutters_xxx-small slds-grid_vertical-align-start">
                            <div class="slds-col">
                                <lightning-input
                                    class={filter.class}
                                    data-name={filter.name}
                                    data-sub-name={propNames.start}
                                    date-access-key={filter.dateAccessKey}
                                    date-style={filter.dateStyle}
                                    field-level-help={filter.fieldLevelHelp}
                                    inputmode={filter.inputmode}
                                    label={labels.start}
                                    max={filter.max}
                                    min={filter.min}
                                    name={filter.name}
                                    placeholder={filter.placeholder}
                                    type={filter.type}
                                    value={filter.value.start}

                                    onchange={handleChange}
                                ></lightning-input>
                            </div>
                            <span class="slds-col minus">-</span>
                            <div class="slds-col">
                                <lightning-input
                                    class={filter.class}
                                    data-name={filter.name}
                                    data-sub-name={propNames.end}
                                    date-access-key={filter.dateAccessKey}
                                    date-style={filter.dateStyle}
                                    field-level-help={filter.fieldLevelHelp}
                                    inputmode={filter.inputmode}
                                    label={labels.end}
                                    max={filter.max}
                                    min={filter.min}
                                    name={filter.name}
                                    placeholder={filter.placeholder}
                                    type={filter.type}
                                    value={filter.value.end}

                                    onchange={handleChange}
                                ></lightning-input>
                            </div>
                        </div>
                    </template>
                    <template lwc:elseif={filter.requiresMinMaxRange}>
                        <div class="slds-grid slds-gutters_xxx-small slds-grid_vertical-align-start">
                            <div class="slds-col">
                                <lightning-input
                                    class={filter.class}
                                    data-name={filter.name}
                                    data-sub-name={propNames.min}
                                    field-level-help={filter.fieldLevelHelp}
                                    formatter={filter.formatter}
                                    inputmode={filter.inputmode}
                                    label={labels.min}
                                    max={filter.max}
                                    min={filter.min}
                                    name={filter.name}
                                    placeholder={filter.placeholder}
                                    step={filter.step}
                                    type={filter.type}
                                    value={filter.value.min}

                                    onchange={handleChange}
                                ></lightning-input>
                            </div>
                            <span class="slds-col minus">-</span>
                            <div class="slds-col">
                                <lightning-input
                                    class={filter.class}
                                    data-name={filter.name}
                                    data-sub-name={propNames.max}
                                    field-level-help={filter.fieldLevelHelp}
                                    formatter={filter.formatter}
                                    inputmode={filter.inputmode}
                                    label={labels.max}
                                    max={filter.max}
                                    min={filter.min}
                                    name={filter.name}
                                    placeholder={filter.placeholder}
                                    step={filter.step}
                                    type={filter.type}
                                    value={filter.value.max}

                                    onchange={handleChange}
                                ></lightning-input>
                            </div>
                        </div>
                    </template>
                    <template lwc:elseif={filter.requiresCheckboxGroup}>
                        <lightning-checkbox-group
                            class={filter.class}
                            label={filter.label}
                            name={filter.name}
                            options={filter.options}
                            value={filter.value}
                            variant={filter.variant}
                            
                            onchange={handleChange}>
                        </lightning-checkbox-group>
                    </template>
                    <template lwc:else>
                        <lightning-input
                            autocomplete={filter.autocomplete}
                            checked={filter.checked}
                            class={filter.class}
                            disabled={filter.disabled}
                            field-level-help={filter.fieldLevelHelp}
                            formatter={filter.formatter}
                            indeterminate={filter.indeterminate}
                            inputmode={filter.inputmode}
                            label={filter.label}
                            max-length={filter.maxLength}
                            min-length={filter.minLength}
                            name={filter.name}
                            pattern={filter.pattern}
                            placeholder={filter.placeholder}
                            type={filter.type}
                            value={filter.value}

                            onchange={handleChange}
                        ></lightning-input>
                    </template>
                </div>
            </template>
        </div>
        <template lwc:if={showFooter}>
            <div class="slds-col slds-grid slds-p-around_small slds-border_top pane-footer">
                <div class="slds-col slds-grid">
                    <template lwc:if={hasDraftFilters}>
                        <div class="slds-col">
                            <lightning-button name="cancel" label={labels.cancel} onclick={handleCancel}></lightning-button>
                        </div>
                    </template>
                    <template lwc:if={areFiltersSet}>
                        <div class="slds-col">
                            <lightning-button name="clear" label={labels.clearAllFilters} onclick={handleClearAllFilters}></lightning-button>
                        </div>
                    </template>
                </div>
                <div class="sdls-col">
                    <lightning-button name="apply" label={labels.apply} variant="brand" disabled={noDraftFilters} onclick={handleApplyFilters}></lightning-button>
                </div>
            </div>
        </template>
    </div>
</template>
