<template>
    <lightning-modal-header label={labels.columnSort}></lightning-modal-header>
    <lightning-modal-body>
        <template lwc:if={applied}>
            <template iterator:it={applied}>
                <div key={it.value.name} class="slds-size_full">
                    <h2 class="slds-p-vertical_x-small">
                        <b>
                            <template lwc:if={it.first}>
                                {labels.sortBy}
                            </template>
                            <template lwc:else>
                                {labels.thenBy}
                            </template>
                        </b>
                    </h2>
                    <div class="slds-grid slds-box">
                        <lightning-button-group>
                            <lightning-button-icon icon-name="utility:arrowup" variant="border-filled" alternative-text="Up" disabled={it.value.upDisabled} onclick={moveUp}></lightning-button-icon>
                            <lightning-button-icon icon-name="utility:arrowdown" variant="border-filled" alternative-text="Down" disabled={it.value.downDisabled} onclick={moveDown}></lightning-button-icon>
                        </lightning-button-group>
                        <div class="slds-col">
                            <lightning-combobox name="option" label="" variant="label-hidden" placeholder={labels.selectColumn} options={options} value={it.value.name}></lightning-combobox>
                        </div>
                        <div class="slds-col_bump-left slds-p-top_xx-small">
                            <lightning-button-icon icon-name="utility:delete" variant="bare" alternative-text="Delete" disabled={it.value.deleteDisabled} onclick={deleteItem}></lightning-button-icon>
                        </div>                
                    </div>
                </div>
            </template>
        </template>
    </lightning-modal-body>
    <lightning-modal-footer>
        <div class="slds-grid slds-grid_align-spread">
            <div class="slds-col">
                <lightning-button label={labels.clear} name="clear" disabled={isAppliedEmpty} onclick={handleClear}></lightning-button>
            </div>
            <div class="slds-col slds-col_bump-left">
                <lightning-button label={labels.cancel} name="cancel" onclick={handleCancel}></lightning-button>
            </div>
            <div class="slds-col slds-m-left_x-small">
                <lightning-button label={labels.apply} name="apply" variant="brand" disabled onclick={handleApply}></lightning-button>
            </div>
        </div>
    </lightning-modal-footer>
</template>
